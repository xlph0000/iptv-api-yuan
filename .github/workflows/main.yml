name: Update Schedule

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # 开启缓存加速

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 直接安装项目运行所需的所有核心库
          pip install requests requests-html requests-file configparser requests_ntlm tqdm
          # 如果项目有 requirements.txt 就装，没有就跳过
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Update IPTV
        run: |
          # 绕过 pipenv，直接用 python 运行主程序
          # 这种方式最稳，不受 Pipfile 的版本限制
          python main.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          mkdir -p output
          git add output/*
          git commit -m "自动更新: $(date +'%Y-%m-%d %H:%M:%S')" || exit 0
          git push

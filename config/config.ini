[Settings]
# --- 核心开关 ---
open_subscribe = True
# 填入大神的源，这里我预填了范明明和YueChan的源，你可以根据需要增删
subscribe_urls = https://raw.githubusercontent.com/fanmingming/live/main/tv/m3u/ipv6.m3u,https://raw.githubusercontent.com/YueChan/Live/main/IPTV.m3u
open_m3u_result = True
open_speed_test = True

# --- 体验优化 (针对25岁且追求效率的你) ---
# 提高最小速率门槛到 1M/s，确保不卡顿
min_speed = 1.0
# 每个频道保留 5 个最快的源即可，太多了反而加载慢
urls_limit = 5
# 测速并发数稍微调高一点点（从10改到20），加快 GitHub Actions 的运行速度
speed_test_limit = 20

# --- 兼容性设置 ---
# 如果你发现播放器播不出 IPv6 的台，就把 ipv_type 改成 ipv4
ipv_type = 全部
ipv_type_prefer = auto
# 保持 1080P 过滤
open_filter_resolution = True
min_resolution = 1920x1080

# --- 保持默认的其他设置 ---
open_driver = False
open_epg = True
open_empty_category = False
open_filter_speed = True
open_hotel = False
open_local = True
open_update = True
open_update_time = True
open_history = True
time_zone = Asia/Shanghai

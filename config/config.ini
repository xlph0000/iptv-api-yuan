[Settings]
# 1. 既然你有 IPv6，我们优先选 IPv6，但要开启智能偏好
ipv_type = 全部
ipv_type_prefer = ipv6

# 2. 核心：关掉那些你“够不着”的源
# 酒店源和组播源通常有地域限制，关掉它们能大幅提升列表质量
open_hotel = False
open_multicast = False

# 3. 提高“入选门槛”
# GitHub 测速 3M/s 的源，分发到你本地可能才刚刚够用
min_speed = 3.0
# 每个频道只保留最快的前 3 个，防止播放器在坏源上卡太久
urls_limit = 3

# 4. 重点抓取“大神订阅源”
open_subscribe = True
# 保持你之前填入的那几个 Raw 链接
